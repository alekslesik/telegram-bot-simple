name: Manual Main Image Push

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag (default: main-<short_sha>)"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  push-image:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve tag and version
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            image_tag="${{ github.event.inputs.image_tag }}"
          else
            image_tag="main-${GITHUB_SHA::7}"
          fi
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "Using image tag: ${image_tag}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.image_tag }}

      - name: Build date
        id: build_date
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build_date.outputs.value }}
