name: Deploy (SSH)

on:
  workflow_run:
    workflows: ["Release (build & push image)"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy-dev:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS (dev)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_PATH }}"
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_READ_USER }}" --password-stdin
            IMAGE_TAG=dev docker compose -f docker-compose.prod.yaml pull
            IMAGE_TAG=dev docker compose -f docker-compose.prod.yaml up -d
            docker image prune -f

  deploy-main:
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master') }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS (prod)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_PATH }}"
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_READ_USER }}" --password-stdin
            IMAGE_TAG=main docker compose -f docker-compose.prod.yaml pull
            IMAGE_TAG=main docker compose -f docker-compose.prod.yaml up -d
            docker image prune -f

